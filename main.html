<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>💹 Tổng quan chi tiêu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/nav.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <script src="./assets/js/main.js" defer></script>
</head>

<body>
    <div class="container">
        <nav>
            <div class="title">
                <h2>💰 Ví của bạn</h2>
                <p>Xin chào</p>
            </div>

            <menu>
                <a href="./main.html">Tổng quan</a>
                <a href="./history.html">Lịch sử giao dịch</a>
                <a href="./add.html">Thêm giao dịch</a>
            </menu>

            <div id="account">
                <div id="avatar"></div>
                <p>Admin</p>
            </div>
        </nav>

        <main class="main">
            <div class="top-bar">
                <h1>Tổng quan tài chính của bạn</h1>
            </div>

            <section class="stats">
                <div id="stat-blue">
                    <p>Số dư</p>
                    <h2 id="balance"><span>0 VNĐ</span></h2>
                </div>
                <div id="stat-green">
                    <p>Thu nhập</p>
                    <h2 id="income"><span>+</span>0 VNĐ</h2>
                </div>
                <div id="stat-red">
                    <p>Chi tiêu</p>
                    <h2 id="expense"><span>-</span>0 VNĐ</h2>
                </div>
            </section>
        </main>
    </div>

</body>

</html>
